# openRigOS YSFGateway.ini — routes YSF traffic between MMDVMHost and YSF reflectors
#
# Placeholder tokens are replaced by mmdvm-update.sh during provisioning.
# This file is managed by openRigOS; manual edits may be overwritten.

[General]
Callsign=__CALLSIGN__
Suffix=__YSF_SUFFIX__
Id=__DMR_ID__
# Daemon=0 — we run under systemd
RptAddress=127.0.0.1
RptPort=4200
LocalAddress=127.0.0.1
LocalPort=3200
WiresXMakeUpper=1
Debug=0

[Info]
RXFrequency=__RX_FREQ__
TXFrequency=__TX_FREQ__
Power=1
Latitude=0.0
Longitude=0.0
Height=0
Location=openRigOS Hotspot
Description=openRigOS
URL=https://openrig.org

[Log]
DisplayLevel=1
FileLevel=1
FilePath=/var/log/openrig/
FileRoot=YSFGateway
FileRotate=1

[APRS]
Enable=0

[Network]
# Startup reflector — set by mmdvm-update.sh from openrig.json
Startup=AMERICA
InactivityTimeout=10
Revert=0
Debug=0

[YSF Network]
Enable=1
Port=42000
Hosts=/usr/local/etc/YSFHosts.txt
ReloadTime=24
ParrotAddress=127.0.0.1
ParrotPort=42012
YSF2DMRAddress=127.0.0.1
YSF2DMRPort=42013
YSF2NXDNAddress=127.0.0.1
YSF2NXDNPort=42014
YSF2P25Address=127.0.0.1
YSF2P25Port=42015

[FCS Network]
Enable=1
Port=42001
Hosts=/usr/local/etc/FCSHosts.txt
ReloadTime=24

[GPSD]
Enable=0
