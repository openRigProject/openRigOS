# openRigOS DMRGateway.ini — routes DMR traffic between MMDVMHost and BrandMeister
#
# Placeholder tokens are replaced by mmdvm-update.sh during provisioning.
# This file is managed by openRigOS; manual edits may be overwritten.

[General]
Timeout=10
# Daemon=0 — we run under systemd
RptAddress=127.0.0.1
RptPort=62031
LocalAddress=127.0.0.1
LocalPort=62032
RuleTrace=0

[Log]
DisplayLevel=1
FileLevel=1
FilePath=/var/log/openrig/
FileRoot=DMRGateway
FileRotate=1

[Voice]
Enabled=0
Language=en_GB
Directory=/usr/local/etc/DMRGateway_Voice

[Info]
RXFrequency=__RX_FREQ__
TXFrequency=__TX_FREQ__
Power=1
Latitude=0.0
Longitude=0.0
Height=0
Location=openRigOS Hotspot
Description=openRigOS
URL=https://openrig.org

[XLX Network 1]
Enabled=0

[DMR Network 1]
Enabled=1
Name=BrandMeister
Id=__DMR_ID__
Address=__BM_SERVER__
Port=62031
Password=__BM_PASSWORD__
Location=0
Debug=0
# TGRewrite: pass all talkgroups through
TGRewrite0=2,0,2,0,1
SrcRewrite0=2,0,2,0,1
PassAllPC0=1
PassAllTG0=1

[DMR Network 2]
Enabled=0
