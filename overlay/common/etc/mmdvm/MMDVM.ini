# openRigOS MMDVM.ini — default template for GPIO/UART MMDVM modems
# (e.g. MMDVM_HS_Hat on Raspberry Pi)
#
# Callsign, frequencies, and colorcode are written by provisioning.
# This file is managed by openRigOS; manual edits may be overwritten.

[General]
Callsign=__CALLSIGN__
Id=0
Timeout=180
Duplex=0
# ModeHang: time (seconds) before returning to idle after last TX
ModeHang=10
RFModeHang=10
NetModeHang=3

[Info]
RXFrequency=__RX_FREQ__
TXFrequency=__TX_FREQ__
Power=1
Latitude=0.0
Longitude=0.0
Height=0
Location=openRigOS Hotspot
Description=openRigOS
URL=https://openrig.org

[Log]
DisplayLevel=1
FileLevel=1
FilePath=/var/log/openrig/
FileRoot=MMDVM
FileRotate=1

[CW Id]
Enable=0

[DMR Id Lookup]
File=/usr/local/etc/DMRIds.dat
Time=24

[NXDN Id Lookup]
File=/usr/local/etc/NXDN.csv
Time=24

[Modem]
Protocol=uart
UARTPort=__MODEM_PORT__
UARTSpeed=__MODEM_SPEED__
# RXInvert=0
# TXInvert=0
# PTTInvert=0
RXOffset=0
TXOffset=0
RXDCOffset=0
TXDCOffset=0
RXLevel=50
TXLevel=50
DMRDelay=0
RXFrequency=__RX_FREQ__
TXFrequency=__TX_FREQ__

[D-Star]
Enable=0

[DMR]
Enable=__DMR_ENABLE__
Beacons=0
BeaconInterval=60
BeaconDuration=3
ColorCode=__DMR_COLORCODE__
SelfOnly=0
EmbeddedLCOnly=0
DumpTAData=1
# CallHang: how long before returning to idle
CallHang=3
TXHang=4
ModeHang=10

[System Fusion]
Enable=__YSF_ENABLE__
LowDeviation=0
SelfOnly=0
# RemoteGateway: use YSFGateway on localhost
RemoteGateway=0
ModeHang=10

[P25]
Enable=0

[NXDN]
Enable=0

[M17]
Enable=0

[POCSAG]
Enable=0

[FM]
Enable=0

[AX.25]
Enable=0

[D-Star Network]
Enable=0

[DMR Network]
Enable=__DMR_ENABLE__
GatewayAddress=127.0.0.1
GatewayPort=62031
LocalAddress=127.0.0.1
LocalPort=62032
# Jitter: buffer depth in 20ms frames (default 360ms)
Jitter=360
Slot1=1
Slot2=1
ModeHang=3
Debug=0

[System Fusion Network]
Enable=__YSF_ENABLE__
LocalAddress=127.0.0.1
LocalPort=3200
GatewayAddress=127.0.0.1
GatewayPort=4200
ModeHang=3
Debug=0

[P25 Network]
Enable=0

[NXDN Network]
Enable=0

[M17 Network]
Enable=0

[POCSAG Network]
Enable=0

[TFT Serial]
Port=/dev/null

[HD44780]
Rows=2
Columns=16

[Nextion]
Port=/dev/null

[OLED]
Type=3

[LCDproc]
Address=localhost
Port=13666

[Lock File]
Enable=0

[Remote Control]
Enable=0

[MQTT]
Enable=1
Address=127.0.0.1
Port=1883
Keepalive=60
Auth=0
Username=mmdvm
Password=mmdvm
Name=mmdvm-host
