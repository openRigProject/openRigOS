syntax = "proto3";

package openrig.v1;

option go_package = "openrig/gen/openrig/v1;openrigv1";

import "openrig/v1/device.proto"; // for Empty

// ── Messages ──────────────────────────────────────────────────────────────

message Talkgroup {
  int32  tg   = 1;
  int32  slot = 2;
  string name = 3;
}

message DMRConfig {
  bool              enabled        = 1;
  int32             dmr_id         = 2;
  int32             colorcode      = 3;
  string            network        = 4; // "brandmeister"|"dmrplus"|"freedmr"|"tgif"|"systemx"|"xlx"|"custom"
  string            server         = 5;
  string            password       = 6;
  repeated Talkgroup talkgroups    = 7;
  int32             dmr_id_suffix  = 8; // 0–99; appended to dmr_id for the effective hotspot ID
}

message YSFConfig {
  bool   enabled              = 1;
  string network              = 2; // "ysf"|"fcs"|"custom"
  string reflector            = 3; // e.g. "AMERICA" for YSF, "FCS001" for FCS
  string module               = 4; // FCS module letter "A"-"Z"
  string suffix               = 5;
  string description          = 6;
  bool   wiresx_passthrough   = 7; // pass WiresX commands through to the reflector
  string link_state           = 8; // runtime only: "linking"|"relinking"|"unlinked" — not persisted
}

message CrossModeConfig {
  bool   ysf2dmr_enabled   = 1;
  int32  ysf2dmr_talkgroup = 2;
  bool   dmr2ysf_enabled   = 3;
  string dmr2ysf_room      = 4;
}

message ModemConfig {
  string type         = 1; // e.g. "mmdvm_hs_hat", "zumspot", "dvmega"
  string port         = 2; // e.g. /dev/ttyAMA0
  // Calibration fields (written to [Modem] section of MMDVM.ini)
  int32  rx_offset    = 3; // RX frequency offset in Hz (compensates for crystal drift)
  int32  tx_offset    = 4; // TX frequency offset in Hz
  int32  rx_dc_offset = 5; // RX DC offset (0–255)
  int32  tx_dc_offset = 6; // TX DC offset (0–255)
  int32  rx_level     = 7; // RX audio level (0–100)
  int32  tx_level     = 8; // TX audio level (0–100)
  int32  dmr_delay    = 9; // DMR TX delay in ms (0–10)
}

message ModemCalibration {
  int32 rx_offset    = 1; // RX frequency offset in Hz
  int32 tx_offset    = 2; // TX frequency offset in Hz
  int32 rx_dc_offset = 3; // RX DC offset (0–255)
  int32 tx_dc_offset = 4; // TX DC offset (0–255)
  int32 rx_level     = 5; // RX audio level (0–100)
  int32 tx_level     = 6; // TX audio level (0–100)
  int32 dmr_delay    = 7; // DMR TX delay in ms (0–10)
}

message UpdateModemCalibrationRequest {
  ModemCalibration calibration = 1;
}

message UpdateModemCalibrationResponse {
  ModemCalibration calibration = 1;
}

message HotspotConfig {
  DMRConfig      dmr          = 1;
  YSFConfig      ysf          = 2;
  CrossModeConfig cross_mode  = 3;
  ModemConfig    modem        = 4;
  double         rf_frequency = 5; // MHz
  double         tx_frequency = 6; // MHz
}

message UpdateHotspotRequest {
  HotspotConfig config = 1;
}

message UpdateDmrIdRequest {
  int32 dmr_id = 1;
}

message UpdateDmrIdResponse {}

message GetServersRequest {
  string network = 1; // "brandmeister"|"ysf"|"fcs"
}

message GetServersResponse {
  repeated string servers = 1;
  // labels[i] is the human-readable display string for servers[i].
  // If empty for a given index, the server value itself is used as the label.
  repeated string labels  = 2;
}

message LastHeardEntry {
  string callsign  = 1;
  string mode      = 2; // "DMR" | "YSF"
  string info      = 3; // TG number for DMR, room name for YSF
  string duration  = 4; // e.g. "12s"
  string timestamp = 5; // RFC3339
  string loss      = 6; // bit error rate, e.g. "0.65%"
}

message LookupCallsignRequest {
  string callsign = 1;
}

message CallsignInfo {
  string call          = 1;
  string first_name    = 2;
  string last_name     = 3;
  string city          = 4;
  string state         = 5;
  string country       = 6;
  string grid          = 7;
  double lat           = 8;
  double lon           = 9;
  string license_class = 10;
  string image_url     = 11;
}

// ── Service ───────────────────────────────────────────────────────────────

service HotspotService {
  rpc GetHotspot(Empty)                      returns (HotspotConfig);
  rpc UpdateHotspot(UpdateHotspotRequest)    returns (HotspotConfig);
  rpc UpdateDmrId(UpdateDmrIdRequest)        returns (UpdateDmrIdResponse);

  // GetServers returns the server list for a given network.
  rpc GetServers(GetServersRequest)          returns (GetServersResponse);

  // LookupCallsign queries QRZ.com for callsign details.
  rpc LookupCallsign(LookupCallsignRequest)  returns (CallsignInfo);

  // StreamLastHeard streams new last-heard entries as they appear.
  rpc StreamLastHeard(Empty)                 returns (stream LastHeardEntry);

  // UpdateModemCalibration updates MMDVM modem calibration values (offsets, levels, delay).
  rpc UpdateModemCalibration(UpdateModemCalibrationRequest) returns (UpdateModemCalibrationResponse);
}
