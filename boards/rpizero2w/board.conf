# openRigOS Board: Raspberry Pi Zero 2 W
# SoC: BCM2710A1 (BCM2837 compatible — same as RPi 3)
# CPU: Quad-core Cortex-A53 @ 1GHz
# RAM: 512MB

ARCH=arm64
DEBIAN_ARCH=arm64
DEBIAN_SUITE=bookworm
BOOTLOADER=rpi-firmware
IMAGE_TYPE=img
IMAGE_SIZE=2G
QEMU_ARCH=aarch64

# RPi Foundation kernel — best BCM2837/WiFi/BT support
KERNEL_PACKAGE=raspberrypi-kernel
KERNEL_HEADERS=raspberrypi-kernel-headers

# Exact DTB for Zero 2 W
DTB=bcm2710-rpi-zero-2-w.dtb

# RPi Foundation APT repo (kernel + firmware)
EXTRA_REPOS="deb http://archive.raspberrypi.com/debian/ bookworm main"
EXTRA_REPO_KEY="https://archive.raspberrypi.com/debian/raspberrypi.gpg.key"

# Firmware: WiFi + BT both require brcm80211
# pi-bluetooth handles the BT UART/HCI setup
FIRMWARE_PACKAGES="raspberrypi-bootloader firmware-brcm80211 pi-bluetooth"

# USB OTG gadget mode (virtual ethernet over micro-USB)
USB_GADGET_ENABLED=true

# Go cross-compilation target
GOARCH=arm64
