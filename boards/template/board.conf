# openRigOS Board Template
# Copy this directory to boards/<your-board-name>/ and fill in the values.

# Debian target architecture (amd64, arm64, armhf, riscv64, ...)
ARCH=arm64
DEBIAN_ARCH=arm64

# Debian suite (bookworm, trixie, ...)
DEBIAN_SUITE=bookworm

# Bootloader: rpi-firmware | grub-efi | u-boot
BOOTLOADER=u-boot

# Output image type: img | iso
IMAGE_TYPE=img
IMAGE_SIZE=2G

# QEMU arch for cross-compilation (aarch64, arm, x86_64, riscv64, ...)
QEMU_ARCH=aarch64

# Kernel package from APT
KERNEL_PACKAGE=linux-image-arm64
KERNEL_HEADERS=linux-headers-arm64

# DTB filename (for ARM boards)
DTB=

# Extra APT repos (optional)
EXTRA_REPOS=""
EXTRA_REPO_KEY=""

# Firmware packages (optional)
FIRMWARE_PACKAGES=""

# For u-boot boards: U-Boot package name
UBOOT_PACKAGE=u-boot-tools

# Go cross-compilation target arch (amd64, arm64, arm, riscv64, ...)
GOARCH=arm64

# Optional features — set to true to enable in /etc/openrig.json
USB_GADGET_ENABLED=false

# Device type — defines the role of this device in the openRig ecosystem
# Leave blank to leave unconfigured (must be set before openRig tools will run)
# Valid values:
#   hotspot   — cross-mode repeater (D-Star, DMR, YSF, etc.)
#   rigctl    — attached to a radio for remote rig control
#   console   — station operator workstation
DEVICE_TYPE=
